<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinCtrl — Contas a Pagar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#f5f4f0;--c-surface:#ffffff;--c-surface2:#f0efe9;
  --c-border:#d8d6cc;
  --c-text:#1a1917;--c-text2:#5c5a54;--c-text3:#8a887f;
  --c-accent:#1a4a2e;--c-accent-light:#e8f2ec;--c-accent-mid:#2d7a4f;
  --c-danger:#8b2222;--c-danger-light:#fdf0f0;
  --c-warn:#7a4a0a;--c-warn-light:#fdf5e8;
  --c-tag:#1a3a5c;--c-tag-light:#e8f0fa;
  --ff:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;
  --r:6px;
}
html,body{height:100%;font-family:var(--ff);background:var(--c-bg);color:var(--c-text);font-size:14px;line-height:1.5}
.app-wrap{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;min-width:224px;background:var(--c-surface);border-right:1px solid var(--c-border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--c-border)}
.sidebar-logo{font-size:12px;font-weight:600;color:var(--c-accent-mid);font-family:var(--fm);letter-spacing:1.2px;text-transform:uppercase}
.sidebar-title{font-size:19px;font-weight:600;margin-top:3px;letter-spacing:-.3px}
.nav-section{padding:12px 8px 4px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--c-text3);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:400;color:var(--c-text2);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--c-surface2);color:var(--c-text)}
.nav-item.active{background:var(--c-accent-light);color:var(--c-accent);font-weight:500}
.nav-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:16px 24px;background:var(--c-surface);border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:17px;font-weight:600}
.page-sub{font-size:12px;color:var(--c-text3);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:var(--ff)}
.btn-primary{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.btn-primary:hover{background:var(--c-accent-mid)}
.btn-secondary{background:var(--c-surface);color:var(--c-text);border-color:var(--c-border)}
.btn-secondary:hover{background:var(--c-surface2)}
.btn-danger{background:var(--c-danger-light);color:var(--c-danger);border-color:transparent}
.btn-danger:hover{border-color:var(--c-danger)}
.btn-sm{padding:5px 10px;font-size:12px}
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:20px}
.card+.card{margin-top:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--c-text3);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.col1{grid-template-columns:1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;font-weight:500;color:var(--c-text2)}
input,select,textarea{font-family:var(--ff);font-size:13px;padding:8px 10px;border:1px solid var(--c-border);border-radius:var(--r);background:var(--c-surface);color:var(--c-text);outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--c-accent-mid)}
textarea{resize:vertical;min-height:64px}
.emp-check-list{border:1px solid var(--c-border);border-radius:var(--r);padding:8px;display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;background:var(--c-surface)}
.emp-check-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:13px}
.emp-check-item:hover{background:var(--c-surface2)}
.emp-check-item input[type=checkbox]{width:auto;cursor:pointer}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 12px;background:var(--c-surface2);border-bottom:1px solid var(--c-border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--c-text3);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--c-border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--c-surface2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--c-accent-light);color:var(--c-accent)}
.badge-blue{background:var(--c-tag-light);color:var(--c-tag)}
.badge-warn{background:var(--c-warn-light);color:var(--c-warn)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:4px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--c-surface);border-radius:10px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--c-text3);padding:2px 8px;border-radius:4px;line-height:1}
.modal-close:hover{background:var(--c-surface2);color:var(--c-text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--c-border)}
.filter-bar{background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:600;color:var(--c-text3);text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{width:auto;min-width:150px;font-size:13px}
.filter-divider{width:1px;height:36px;background:var(--c-border);align-self:flex-end;margin-bottom:2px}
.filter-range-wrap{display:flex;align-items:center;gap:6px}
.filter-range-wrap span{font-size:12px;color:var(--c-text3)}
.empty-state{text-align:center;padding:52px 24px;color:var(--c-text3)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--c-accent);color:#fff;padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .25s;z-index:200;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{transform:translateY(0);opacity:1}
/* Dashboard */
.dash-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:18px 20px}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--c-text3);margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:600;font-family:var(--fm);letter-spacing:-.5px;line-height:1}
.kpi-sub{font-size:12px;color:var(--c-text3);margin-top:5px}
.kpi-green{border-top:3px solid var(--c-accent-mid)}
.kpi-warn{border-top:3px solid #c97a0f}
.kpi-blue{border-top:3px solid #2563a8}
.kpi-red{border-top:3px solid var(--c-danger)}
.dash-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:20px}
.chart-title{font-size:14px;font-weight:600;margin-bottom:2px}
.chart-sub{font-size:12px;color:var(--c-text3);margin-bottom:16px}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--c-border)}
.emp-row:last-child{border-bottom:none}
.emp-bar-wrap{flex:1;margin:0 14px;height:6px;background:var(--c-surface2);border-radius:3px;overflow:hidden}
.emp-bar{height:100%;border-radius:3px;transition:width .5s ease}
.valor-destaque{font-family:var(--fm);font-weight:600;color:var(--c-accent)}
.trunc{max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hint{font-size:11px;color:var(--c-text3);margin-top:2px}
.loading-overlay{position:fixed;inset:0;background:rgba(245,244,240,.85);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--c-border);border-top-color:var(--c-accent-mid);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--c-text3)}
.loading-overlay.hidden{display:none}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando dados...</div>
</div>

<div class="app-wrap">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">FinCtrl</div>
      <div class="sidebar-title">Contas a Pagar</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Visão Geral</div>
      <button class="nav-item active" onclick="nav('dashboard')"><span class="nav-icon">▦</span> Dashboard</button>
      <button class="nav-item" onclick="nav('despesas')"><span class="nav-icon">◈</span> Despesas Mensais</button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Cadastros</div>
      <button class="nav-item" onclick="nav('fornecedores')"><span class="nav-icon">◉</span> Fornecedores</button>
      <button class="nav-item" onclick="nav('tipos')"><span class="nav-icon">◧</span> Tipos de Despesa</button>
      <button class="nav-item" onclick="nav('empresas')"><span class="nav-icon">◫</span> Empresas</button>
      <button class="nav-item" onclick="nav('regras')"><span class="nav-icon">◐</span> Regras de Pagamento</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="pt">Dashboard</div>
        <div class="page-sub" id="ps">Visão geral financeira</div>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="openAdd()" style="display:none">+ Adicionar</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Novo Registro</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bmfnclyvvwvyefdopixv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nMhnblRLoBo4nmSI-oiISQ_3-PGfVW-';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const db = {fornecedores:[],tipos:[],empresas:[],regras:[],despesas:[]};
let curPage='dashboard', editId=null, editSection=null;
let fEmp=0, fVencDe='', fVencAte='';
let chartPizza=null, chartBarra=null;

const PALETTE=[
  {bg:'#e8f0fa',c:'#1a3a5c',bar:'#2563a8'},
  {bg:'#e8f2ec',c:'#1a4a2e',bar:'#2d7a4f'},
  {bg:'#fdf5e8',c:'#7a4a0a',bar:'#c97a0f'},
  {bg:'#fdf0f0',c:'#8b2222',bar:'#c0392b'},
  {bg:'#f3e8fd',c:'#4a1a7a',bar:'#7c3aed'},
  {bg:'#e8fdfc',c:'#0a5c58',bar:'#0891b2'},
  {bg:'#fef3c7',c:'#6b3a0a',bar:'#d97706'},
];

function fromSB(sec,row){
  if(sec==='fornecedores') return {id:row.id,nome:row.nome,email:row.email||'',cnpj:row.cnpj||'',empresaIds:row.empresa_ids||[]};
  if(sec==='tipos')        return {id:row.id,nome:row.nome,obs:row.obs||''};
  if(sec==='empresas')     return {id:row.id,nome:row.nome};
  if(sec==='regras')       return {id:row.id,nome:row.nome,desc:row.descricao||''};
  if(sec==='despesas')     return {id:row.id,fornecedorId:row.fornecedor_id,tipoId:row.tipo_id,empresaId:row.empresa_id,
    vencimento:row.vencimento,valor:row.valor||0,doc:row.doc||'',email:row.email||'',obs:row.obs||'',regraId:row.regra_id};
}
function toSB(sec,obj){
  if(sec==='fornecedores') return {nome:obj.nome,email:obj.email||'',cnpj:obj.cnpj||'',empresa_ids:obj.empresaIds||[]};
  if(sec==='tipos')        return {nome:obj.nome,obs:obj.obs||''};
  if(sec==='empresas')     return {nome:obj.nome};
  if(sec==='regras')       return {nome:obj.nome,descricao:obj.desc||''};
  if(sec==='despesas')     return {fornecedor_id:obj.fornecedorId,tipo_id:obj.tipoId,empresa_id:obj.empresaId,
    vencimento:obj.vencimento,valor:obj.valor||0,doc:obj.doc||'',email:obj.email||'',obs:obj.obs||'',regra_id:obj.regraId||null};
}

async function loadAll(){
  showLoading(true);
  try{
    for(const sec of ['empresas','tipos','regras','fornecedores','despesas']){
      const {data,error}=await sb.from(sec).select('*').order('id');
      if(error) throw error;
      db[sec]=(data||[]).map(r=>fromSB(sec,r));
    }
  }catch(e){showToast('Erro ao carregar: '+e.message,'err');}
  showLoading(false);
  render();
}

function showLoading(v){document.getElementById('loadingOverlay').classList.toggle('hidden',!v);}
function byId(arr,id){return arr.find(x=>x.id===id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function brl(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pal(empId){const i=db.empresas.findIndex(e=>e.id===empId);return PALETTE[i%PALETTE.length]||PALETTE[0];}
function empTag(empId){
  const e=byId(db.empresas,empId); if(!e) return '';
  const p=pal(empId);
  return `<span class="badge" style="background:${p.bg};color:${p.c};border:1px solid ${p.c}33">${esc(e.nome)}</span>`;
}

function nav(p){
  curPage=p;
  if(p!=='dashboard') destroyCharts();
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>{
    const map={dashboard:'dashboard',despesas:'despesas',fornecedores:'fornecedores',tipos:'tipos',empresas:'empresas',regras:'regras'};
    if(b.textContent.trim().toLowerCase().includes(map[p]||'__')) b.classList.add('active');
  });
  const titles={
    dashboard:['Dashboard','Visão geral financeira'],
    despesas:['Despesas Mensais','Gerencie suas contas a pagar'],
    fornecedores:['Fornecedores','Cadastro de fornecedores'],
    tipos:['Tipos de Despesa','Categorias de despesas'],
    empresas:['Empresas','Cadastro de empresas'],
    regras:['Regras de Pagamento','Políticas de pagamento']
  };
  const t=titles[p]||['',''];
  document.getElementById('pt').textContent=t[0];
  document.getElementById('ps').textContent=t[1];
  document.getElementById('addBtn').style.display=p==='dashboard'?'none':'inline-flex';
  render();
}

function destroyCharts(){
  if(chartPizza){chartPizza.destroy();chartPizza=null;}
  if(chartBarra){chartBarra.destroy();chartBarra=null;}
}

function render(){
  const c=document.getElementById('content');
  if     (curPage==='dashboard')    c.innerHTML=renderDash();
  else if(curPage==='fornecedores') c.innerHTML=renderFornecedores();
  else if(curPage==='tipos')        c.innerHTML=renderList('tipos',['Nome','Observação Padrão'],r=>[esc(r.nome),esc(r.obs)]);
  else if(curPage==='empresas')     c.innerHTML=renderList('empresas',['Empresa','Despesas','Total Mensal'],
    r=>[esc(r.nome),
      `<span class="badge badge-blue">${db.despesas.filter(d=>d.empresaId===r.id).length}</span>`,
      `<span class="valor-destaque">${brl(db.despesas.filter(d=>d.empresaId===r.id).reduce((s,d)=>s+(+d.valor||0),0))}</span>`]);
  else if(curPage==='regras')       c.innerHTML=renderList('regras',['Nome da Regra','Descrição'],r=>[esc(r.nome),esc(r.desc)]);
  else if(curPage==='despesas')     c.innerHTML=renderDespesas();
  if(curPage==='dashboard') setTimeout(buildCharts,60);
}

function renderDash(){
  const total=db.despesas.reduce((s,d)=>s+(+d.valor||0),0);
  const v10=db.despesas.filter(d=>d.vencimento<=10);
  const totalV10=v10.reduce((s,d)=>s+(+d.valor||0),0);
  const semValor=db.despesas.filter(d=>!d.valor||+d.valor===0).length;
  const empRows=db.empresas.map(e=>{
    const ds=db.despesas.filter(d=>d.empresaId===e.id);
    const tot=ds.reduce((s,d)=>s+(+d.valor||0),0);
    const p=pal(e.id);
    const pct=total>0?Math.round(tot/total*100):0;
    return {e,ds,tot,p,pct};
  }).sort((a,b)=>b.tot-a.tot);

  return `
  <div class="dash-kpis">
    <div class="kpi kpi-green">
      <div class="kpi-label">Total Mensal</div>
      <div class="kpi-val">${brl(total)}</div>
      <div class="kpi-sub">${db.despesas.length} despesas cadastradas</div>
    </div>
    <div class="kpi kpi-warn">
      <div class="kpi-label">Vencem até dia 10</div>
      <div class="kpi-val">${brl(totalV10)}</div>
      <div class="kpi-sub">${v10.length} despesas a vencer em breve</div>
    </div>
    <div class="kpi kpi-blue">
      <div class="kpi-label">Empresas</div>
      <div class="kpi-val">${db.empresas.length}</div>
      <div class="kpi-sub">${db.fornecedores.length} fornecedores cadastrados</div>
    </div>
    <div class="kpi ${semValor>0?'kpi-red':'kpi-green'}">
      <div class="kpi-label">Sem valor definido</div>
      <div class="kpi-val">${semValor}</div>
      <div class="kpi-sub">${semValor>0?'Despesas sem valor':'Todos preenchidos'}</div>
    </div>
  </div>

  <div class="dash-charts">
    <div class="chart-box">
      <div class="chart-title">Vencimentos por dia do mês</div>
      <div class="chart-sub">Valor total agrupado por data de vencimento</div>
      <div style="position:relative;height:260px"><canvas id="chartPizza"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Valor por tipo de despesa</div>
      <div class="chart-sub">Total mensal por categoria</div>
      <div style="position:relative;height:260px"><canvas id="chartBarra"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Total por empresa</div>
    <div class="card-sub">Proporção dos gastos mensais</div>
    ${empRows.length===0
      ?'<div style="color:var(--c-text3);font-size:13px">Nenhuma empresa cadastrada.</div>'
      :empRows.map(({e,ds,tot,p,pct})=>`
        <div class="emp-row">
          <div style="display:flex;align-items:center;gap:8px;min-width:170px">
            <span class="badge" style="background:${p.bg};color:${p.c};border:1px solid ${p.c}33">${esc(e.nome)}</span>
            <span style="font-size:11px;color:var(--c-text3)">${ds.length} desp.</span>
          </div>
          <div class="emp-bar-wrap"><div class="emp-bar" style="width:${pct}%;background:${p.bar}"></div></div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:var(--fm);font-weight:600;font-size:14px">${brl(tot)}</span>
            <button class="btn btn-secondary btn-sm" onclick="nav('despesas');setTimeout(()=>setEmpFilter(${e.id}),60)">Ver →</button>
          </div>
        </div>`).join('')}
  </div>`;
}

function buildCharts(){
  destroyCharts();
  // Pizza — vencimento por dia
  const diasMap={};
  db.despesas.forEach(d=>{const k='Dia '+d.vencimento;diasMap[k]=(diasMap[k]||0)+(+d.valor||0);});
  const diasArr=Object.entries(diasMap).sort((a,b)=>parseInt(a[0].split(' ')[1])-parseInt(b[0].split(' ')[1]));
  const ctxP=document.getElementById('chartPizza');
  if(ctxP&&diasArr.length>0){
    chartPizza=new Chart(ctxP,{
      type:'doughnut',
      data:{labels:diasArr.map(x=>x[0]),datasets:[{
        data:diasArr.map(x=>x[1]),
        backgroundColor:diasArr.map((_,i)=>PALETTE[i%PALETTE.length].bar),
        borderWidth:2,borderColor:'#ffffff'
      }]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
        plugins:{
          legend:{position:'right',labels:{font:{size:11,family:'IBM Plex Sans'},padding:8,boxWidth:12}},
          tooltip:{callbacks:{label:ctx=>' '+brl(ctx.raw)}}
        }
      }
    });
  }else if(ctxP){
    ctxP.parentElement.innerHTML='<div style="color:var(--c-text3);font-size:13px;padding:60px 0;text-align:center">Sem dados.</div>';
  }
  // Barras — valor por tipo
  const tipoMap={};
  db.despesas.forEach(d=>{const t=byId(db.tipos,d.tipoId);const k=t?t.nome:'(sem tipo)';tipoMap[k]=(tipoMap[k]||0)+(+d.valor||0);});
  const tipoArr=Object.entries(tipoMap).sort((a,b)=>b[1]-a[1]);
  const ctxB=document.getElementById('chartBarra');
  if(ctxB&&tipoArr.length>0){
    chartBarra=new Chart(ctxB,{
      type:'bar',
      data:{labels:tipoArr.map(x=>x[0]),datasets:[{
        data:tipoArr.map(x=>x[1]),
        backgroundColor:tipoArr.map((_,i)=>PALETTE[i%PALETTE.length].bar),
        borderRadius:6,borderSkipped:false
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+brl(ctx.raw)}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11,family:'IBM Plex Sans'}}},
          y:{grid:{color:'#e8e6df'},ticks:{callback:v=>brl(v),font:{size:10,family:'IBM Plex Sans'}}}
        }
      }
    });
  }else if(ctxB){
    ctxB.parentElement.innerHTML='<div style="color:var(--c-text3);font-size:13px;padding:60px 0;text-align:center">Sem dados.</div>';
  }
}

function renderFornecedores(){
  const rows=db.fornecedores;
  return `<div class="card" style="padding:0;overflow:hidden">
    ${rows.length===0?`<div class="empty-state">Nenhum fornecedor.</div>`
    :`<div class="table-wrap"><table>
      <thead><tr><th>Nome</th><th>E-mail</th><th>CNPJ</th><th>Empresas</th><th>Ações</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td style="font-weight:500">${esc(r.nome)}</td>
        <td style="font-size:12px;color:var(--c-text2)">${esc(r.email)}</td>
        <td><span style="font-family:var(--fm);font-size:12px">${esc(r.cnpj)}</span></td>
        <td><div class="tags-wrap">${r.empresaIds&&r.empresaIds.length?r.empresaIds.map(eid=>empTag(eid)).join(''):'<span style="color:var(--c-text3);font-size:12px">Nenhuma</span>'}</div></td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-secondary btn-sm" onclick="openEdit('fornecedores',${r.id})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="del('fornecedores',${r.id})">✕</button>
        </div></td></tr>`).join('')}</tbody></table></div>`}
  </div>`;
}

function renderList(sec,headers,rowFn){
  const rows=db[sec];
  return `<div class="card" style="padding:0;overflow:hidden">
    ${rows.length===0?`<div class="empty-state">Nenhum registro.</div>`
    :`<div class="table-wrap"><table>
      <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th>Ações</th></tr></thead>
      <tbody>${rows.map(r=>{const cols=rowFn(r);return `<tr>${cols.map(c=>`<td>${c}</td>`).join('')}
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-secondary btn-sm" onclick="openEdit('${sec}',${r.id})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="del('${sec}',${r.id})">✕</button>
        </div></td></tr>`;}).join('')}</tbody></table></div>`}
  </div>`;
}

function setEmpFilter(id){fEmp=id;const s=document.getElementById('fEmpSel');if(s)s.value=id;}

function renderDespesas(){
  const empOpts=db.empresas.map(e=>`<option value="${e.id}" ${fEmp==e.id?'selected':''}>${esc(e.nome)}</option>`).join('');
  let filtered=[...db.despesas];
  if(fEmp>0) filtered=filtered.filter(d=>d.empresaId==fEmp);
  const vDe=fVencDe!==''?+fVencDe:null, vAte=fVencAte!==''?+fVencAte:null;
  if(vDe!==null) filtered=filtered.filter(d=>d.vencimento>=vDe);
  if(vAte!==null) filtered=filtered.filter(d=>d.vencimento<=vAte);
  filtered.sort((a,b)=>a.vencimento-b.vencimento);
  const totalF=filtered.reduce((s,d)=>s+(+d.valor||0),0);

  return `<div class="filter-bar">
    <div class="filter-group"><label>Empresa</label>
      <select id="fEmpSel" onchange="fEmp=+this.value;render()">
        <option value="0">Todas</option>${empOpts}
      </select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group"><label>Vencimento — dia</label>
      <div class="filter-range-wrap">
        <input type="number" min="1" max="31" placeholder="De" value="${fVencDe}" onchange="fVencDe=this.value;render()" style="min-width:65px;max-width:72px">
        <span>até</span>
        <input type="number" min="1" max="31" placeholder="Até" value="${fVencAte}" onchange="fVencAte=this.value;render()" style="min-width:65px;max-width:72px">
      </div>
    </div>
    <div class="filter-group"><label>&nbsp;</label>
      <button class="btn btn-secondary btn-sm" onclick="fEmp=0;fVencDe='';fVencAte='';render()">Limpar</button>
    </div>
    <div style="flex:1"></div>
    <div style="align-self:flex-end;padding-bottom:4px;text-align:right">
      <div style="font-size:11px;color:var(--c-text3)">${filtered.length} registro(s)</div>
      <div style="font-size:16px;font-weight:600;font-family:var(--fm);color:var(--c-accent)">${brl(totalF)}</div>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${filtered.length===0?`<div class="empty-state">Nenhuma despesa encontrada.</div>`
    :`<div class="table-wrap"><table>
      <thead><tr>
        <th>Fornecedor</th><th>Tipo</th><th>Empresa</th><th>Vencimento</th><th>Valor</th>
        <th>Documento</th><th>E-mail</th><th>Observação</th><th>Regra</th><th>Ações</th>
      </tr></thead>
      <tbody>${filtered.map(d=>{
        const f=byId(db.fornecedores,d.fornecedorId),t=byId(db.tipos,d.tipoId);
        const e=byId(db.empresas,d.empresaId),r=byId(db.regras,d.regraId);
        const vs=d.vencimento<=5?'color:var(--c-danger);font-weight:600':d.vencimento<=10?'color:var(--c-warn);font-weight:500':'';
        return `<tr>
          <td style="font-weight:500">${f?esc(f.nome):'—'}</td>
          <td>${t?`<span class="badge badge-green">${esc(t.nome)}</span>`:'—'}</td>
          <td>${e?empTag(e.id):'—'}</td>
          <td><span style="font-family:var(--fm);font-size:12px;background:var(--c-surface2);padding:2px 8px;border-radius:4px;${vs}">dia ${d.vencimento}</span></td>
          <td><span style="font-family:var(--fm);font-weight:600;color:var(--c-accent)">${d.valor&&+d.valor>0?brl(d.valor):'<span style="color:var(--c-text3);font-weight:400">—</span>'}</span></td>
          <td>${d.doc?`<a href="${esc(d.doc)}" style="color:var(--c-tag);font-size:12px" target="_blank">Ver ↗</a>`:'—'}</td>
          <td class="trunc"><span style="font-size:12px;color:var(--c-text2)">${esc(d.email)||'—'}</span></td>
          <td class="trunc"><span style="font-size:12px">${esc(d.obs)||'—'}</span></td>
          <td>${r?`<span class="badge badge-warn">${esc(r.nome)}</span>`:'—'}</td>
          <td><div style="display:flex;gap:4px">
            <button class="btn btn-secondary btn-sm" onclick="openEdit('despesas',${d.id})">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="del('despesas',${d.id})">✕</button>
          </div></td></tr>`;
      }).join('')}</tbody></table></div>`}
  </div>`;
}

function openAdd(){editId=null;editSection=curPage;openModal();}
function openEdit(sec,id){editId=id;editSection=sec;openModal();}

function openModal(){
  const sec=editSection, rec=editId?byId(db[sec],editId):null;
  document.getElementById('modalTitle').textContent=editId?'Editar Registro':'Novo Registro';
  let body='';

  if(sec==='fornecedores'){
    const chk=db.empresas.map(e=>{
      const ck=rec&&rec.empresaIds&&rec.empresaIds.includes(e.id)?'checked':'';
      const p=pal(e.id);
      return `<label class="emp-check-item"><input type="checkbox" name="empIds" value="${e.id}" ${ck}>
        <span class="badge" style="background:${p.bg};color:${p.c};border:1px solid ${p.c}33;font-size:12px">${esc(e.nome)}</span></label>`;
    }).join('');
    body=`<div class="form-grid">
      <div class="form-group form-full"><label>Nome *</label><input id="f_nome" value="${esc(rec?rec.nome:'')}"></div>
      <div class="form-group"><label>E-mail</label><input id="f_email" type="email" value="${esc(rec?rec.email:'')}"></div>
      <div class="form-group"><label>CNPJ</label><input id="f_cnpj" value="${esc(rec?rec.cnpj:'')}"></div>
      <div class="form-group form-full"><label>Empresas vinculadas</label>
        ${db.empresas.length===0?'<p style="font-size:12px;color:var(--c-text3)">Nenhuma empresa.</p>':`<div class="emp-check-list">${chk}</div>`}
      </div></div>`;
  }else if(sec==='tipos'){
    body=`<div class="form-grid col1">
      <div class="form-group"><label>Nome *</label><input id="t_nome" value="${esc(rec?rec.nome:'')}"></div>
      <div class="form-group"><label>Observação padrão</label><textarea id="t_obs">${esc(rec?rec.obs:'')}</textarea></div>
    </div>`;
  }else if(sec==='empresas'){
    body=`<div class="form-group"><label>Nome *</label><input id="e_nome" value="${esc(rec?rec.nome:'')}"></div>`;
  }else if(sec==='regras'){
    body=`<div class="form-grid col1">
      <div class="form-group"><label>Nome *</label><input id="r_nome" value="${esc(rec?rec.nome:'')}"></div>
      <div class="form-group"><label>Descrição</label><textarea id="r_desc">${esc(rec?rec.desc:'')}</textarea></div>
    </div>`;
  }else if(sec==='despesas'){
    const selEmpId=rec?rec.empresaId:(db.empresas[0]||{}).id;
    const eOpts=db.empresas.map(e=>`<option value="${e.id}" ${rec&&rec.empresaId===e.id?'selected':''}>${esc(e.nome)}</option>`).join('');
    const fornF=db.fornecedores.filter(f=>!f.empresaIds||f.empresaIds.length===0||f.empresaIds.includes(selEmpId));
    const fOpts=fornF.map(f=>`<option value="${f.id}" ${rec&&rec.fornecedorId===f.id?'selected':''}>${esc(f.nome)}</option>`).join('');
    const tOpts=db.tipos.map(t=>`<option value="${t.id}" ${rec&&rec.tipoId===t.id?'selected':''}>${esc(t.nome)}</option>`).join('');
    const rgOpts=db.regras.map(r=>`<option value="${r.id}" ${rec&&rec.regraId===r.id?'selected':''}>${esc(r.nome)}</option>`).join('');
    const vf=rec&&rec.valor?Number(rec.valor).toFixed(2):'';
    body=`<div class="form-grid">
      <div class="form-group"><label>Empresa *</label>
        <select id="d_emp" onchange="updateFornSelect()">${eOpts}</select>
        <div class="hint">Filtra os fornecedores</div>
      </div>
      <div class="form-group"><label>Fornecedor *</label>
        <select id="d_forn" onchange="fillEmailObs()">${fOpts||'<option value="">Nenhum vinculado</option>'}</select>
      </div>
      <div class="form-group"><label>Tipo de Despesa *</label>
        <select id="d_tipo" onchange="fillEmailObs()">${tOpts}</select>
      </div>
      <div class="form-group"><label>Dia de Vencimento *</label>
        <input id="d_venc" type="number" min="1" max="31" value="${rec?rec.vencimento:''}" placeholder="Ex: 10">
      </div>
      <div class="form-group"><label>Valor Mensal (R$)</label>
        <input id="d_valor" type="number" min="0" step="0.01" value="${vf}" placeholder="0,00">
        <div class="hint">Deixe 0 se o valor varia todo mês</div>
      </div>
      <div class="form-group"><label>Regra de Pagamento</label>
        <select id="d_regra"><option value="">— Nenhuma —</option>${rgOpts}</select>
      </div>
      <div class="form-group"><label>Link do Documento</label>
        <input id="d_doc" value="${esc(rec?rec.doc:'')}">
      </div>
      <div class="form-group"><label>E-mail Associado</label>
        <input id="d_email" type="email" value="${esc(rec?rec.email:'')}">
      </div>
      <div class="form-group form-full"><label>Observação</label>
        <textarea id="d_obs">${esc(rec?rec.obs:'')}</textarea>
      </div>
    </div>`;
  }
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modal').classList.add('open');
}

function updateFornSelect(){
  const empId=+document.getElementById('d_emp').value;
  const ff=db.fornecedores.filter(f=>!f.empresaIds||f.empresaIds.length===0||f.empresaIds.includes(empId));
  document.getElementById('d_forn').innerHTML=ff.length?ff.map(f=>`<option value="${f.id}">${esc(f.nome)}</option>`).join(''):'<option value="">Nenhum vinculado</option>';
  fillEmailObs();
}
function fillEmailObs(){
  if(editId) return;
  const fEl=document.getElementById('d_forn'),tEl=document.getElementById('d_tipo');
  if(!fEl||!tEl) return;
  const f=byId(db.fornecedores,+fEl.value),t=byId(db.tipos,+tEl.value);
  if(f) document.getElementById('d_email').value=f.email||'';
  if(t) document.getElementById('d_obs').value=t.obs||'';
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function saveModal(){
  const sec=editSection; let obj={};
  if(sec==='fornecedores'){
    const n=document.getElementById('f_nome').value.trim();
    if(!n){showToast('Nome obrigatório','err');return;}
    const empIds=Array.from(document.querySelectorAll('input[name=empIds]:checked')).map(c=>+c.value);
    obj={nome:n,email:document.getElementById('f_email').value.trim(),cnpj:document.getElementById('f_cnpj').value.trim(),empresaIds:empIds};
  }else if(sec==='tipos'){
    const n=document.getElementById('t_nome').value.trim();
    if(!n){showToast('Nome obrigatório','err');return;}
    obj={nome:n,obs:document.getElementById('t_obs').value.trim()};
  }else if(sec==='empresas'){
    const n=document.getElementById('e_nome').value.trim();
    if(!n){showToast('Nome obrigatório','err');return;}
    obj={nome:n};
  }else if(sec==='regras'){
    const n=document.getElementById('r_nome').value.trim();
    if(!n){showToast('Nome obrigatório','err');return;}
    obj={nome:n,desc:document.getElementById('r_desc').value.trim()};
  }else if(sec==='despesas'){
    const v=+document.getElementById('d_venc').value;
    if(!v||v<1||v>31){showToast('Dia inválido (1–31)','err');return;}
    const fId=+document.getElementById('d_forn').value,tId=+document.getElementById('d_tipo').value,eId=+document.getElementById('d_emp').value;
    if(!fId){showToast('Selecione um fornecedor','err');return;}
    if(!tId){showToast('Selecione um tipo','err');return;}
    if(!eId){showToast('Selecione uma empresa','err');return;}
    const val=parseFloat(document.getElementById('d_valor').value)||0;
    obj={fornecedorId:fId,tipoId:tId,empresaId:eId,vencimento:v,valor:val,
      doc:document.getElementById('d_doc').value.trim(),
      email:document.getElementById('d_email').value.trim(),
      obs:document.getElementById('d_obs').value.trim(),
      regraId:+document.getElementById('d_regra').value||null};
  }
  const payload=toSB(sec,obj);
  showLoading(true);
  try{
    if(editId){
      const {error}=await sb.from(sec).update(payload).eq('id',editId);
      if(error) throw error;
      Object.assign(byId(db[sec],editId),obj);
      showToast('Atualizado!');
    }else{
      const {data,error}=await sb.from(sec).insert(payload).select().single();
      if(error) throw error;
      obj.id=data.id; db[sec].push(obj);
      showToast('Salvo!');
    }
  }catch(e){showToast('Erro: '+e.message,'err');}
  showLoading(false);
  closeModal();
  render();
}

async function del(sec,id){
  if(!confirm('Excluir este registro?')) return;
  showLoading(true);
  try{
    const {error}=await sb.from(sec).delete().eq('id',id);
    if(error) throw error;
    db[sec]=db[sec].filter(x=>x.id!==id);
    showToast('Excluído.');
  }catch(e){showToast('Erro: '+e.message,'err');}
  showLoading(false);
  render();
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'var(--c-danger)':'var(--c-accent)';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2800);
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
loadAll();
</script>
</body>
</html>
